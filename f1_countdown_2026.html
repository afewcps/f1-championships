<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #191919;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12px;
    min-height: 100vh;
  }

  .widget {
    width: 100%;
    max-width: 420px;
  }

  /* ── Header ── */
  .pit-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    border-left: 3px solid #adadad;
    padding-left: 12px;
  }
  .pit-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #39e500;
    animation: blink 1.2s infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
  .pit-status {
    font-size: 11px;
    letter-spacing: 3px;
    color: #adadad;
    text-transform: uppercase;
  }

  /* ── Name ── */
  .pit-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: #fff;
    line-height: 1;
    margin-bottom: 2px;
    padding-left: 15px;
  }
  .pit-session {
    font-size: 11px;
    color: #adadad;
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-left: 15px;
  }

  /* ── Grid ── */
  .pit-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-bottom: 10px;
  }
  .pit-cell {
    background: #111;
    border: 1px solid #1e1e1e;
    text-align: center;
    padding: 14px 6px 10px;
    position: relative;
  }
  .pit-cell::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    transition: background 0.6s ease;
  }
  /* colour states */
  .pit-cell.c-white::before  { background: #ffffff; }
  .pit-cell.c-yellow::before { background: #ffcc00; }
  .pit-cell.c-green::before  { background: #39e500; }
  .pit-cell.c-purple::before { background: #a855f7; }

  .pit-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1;
    display: block;
    transition: color 0.6s ease;
  }
  .pit-cell.c-white  .pit-num { color: #ffffff; }
  .pit-cell.c-yellow .pit-num { color: #ffcc00; }
  .pit-cell.c-green  .pit-num { color: #39e500; }
  .pit-cell.c-purple .pit-num { color: #a855f7; }

  .pit-unit {
    font-size: 9px;
    letter-spacing: 3px;
    color: #adadad;
    margin-top: 5px;
    display: block;
  }

  /* ── Footer ── */
  .pit-next {
    font-size: 11px;
    letter-spacing: 2px;
    color: #adadad;
    text-align: right;
  }
</style>
</head>
<body>
<div class="widget">

  <div class="pit-header">
    <div class="pit-dot" id="pit-dot" style="display:none"></div>
    <div class="pit-status" id="pit-status">NEXT EVENT</div>
  </div>

  <div class="pit-name" id="pit-name">—</div>
  <div class="pit-session" id="pit-session">—</div>

  <div class="pit-grid">
    <div class="pit-cell c-white" id="pc-d">

      <span class="pit-unit">DAYS</span>
    </div>
    <div class="pit-cell c-white" id="pc-h">

      <span class="pit-unit">HRS</span>
    </div>
    <div class="pit-cell c-white" id="pc-m">

    <div class="pit-cell c-white" id="pc-s">

      <span class="pit-unit">SEC</span>
    </div>
  </div>

  <div class="pit-next" id="pit-next">—</div>

</div>

  if (!str || !str.trim()) return null;
  const [dp, tp] = str.trim().split(' ');
  const [m, d, y] = dp.split('/');
  const [hh, mm] = tp ? tp.split(':') : ['0','0'];
  return new Date(+y, +m-1, +d, +hh, +mm);
}

  const parts = raw.split(' - ');
  const title = cleanName(parts[0]);
  const session = parts[1] ? parts[1].trim() : '';
  return { title, session, start: pd(s), end: e ? pd(e) : null };
}).filter(ev => ev.start);

function getColors(days, hours, mins, live) {
  if (live)                                          return ['c-green','c-green','c-green','c-green'];
  if (days > 3)                                      return ['c-white','c-white','c-white','c-white'];
  if (days >= 1)                                     return ['c-yellow','c-white','c-white','c-white'];
  if (days === 0 && hours > 6)                       return ['c-green','c-yellow','c-white','c-white'];
  if (days === 0 && hours >= 1)                      return ['c-purple','c-green','c-yellow','c-white'];
  if (days === 0 && hours === 0 && mins > 0)         return ['c-purple','c-purple','c-green','c-yellow'];
  return ['c-purple','c-purple','c-purple','c-purple'];
}

function setColor(id, cls) {
  const el = document.getElementById(id);
  el.className = 'pit-cell ' + cls;
}

function getCurrent() {
  const now = new Date();
  for (const ev of EVENTS) {
    if (ev.end && now >= ev.start && now < ev.end) return { ev, live: true };
  }
  for (const ev of EVENTS) {
    if (ev.start > now) return { ev, live: false };
  }
  return null;
}

function getNext(ev) {
  const i = EVENTS.indexOf(ev);
  return (i >= 0 && i + 1 < EVENTS.length) ? EVENTS[i + 1] : null;
}

function tick() {
  const res = getCurrent();
  if (!res) return;
  const { ev, live } = res;
  const next = getNext(ev);
  const target = live ? ev.end : ev.start;
  if (!target) return;

  const diff  = Math.max(0, target - new Date());
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);

  document.getElementById('pit-d').textContent = pad(days);
  document.getElementById('pit-h').textContent = pad(hours);
  document.getElementById('pit-m').textContent = pad(mins);
  document.getElementById('pit-s').textContent = pad(secs);

  document.getElementById('pit-name').textContent    = ev.title;
  document.getElementById('pit-session').textContent = ev.session;
  document.getElementById('pit-status').textContent  = live ? 'SESSION LIVE' : 'NEXT EVENT';
  document.getElementById('pit-dot').style.display   = live ? 'block' : 'none';

  document.getElementById('pit-next').textContent = (next && next.session !== 'Practice 1')
    ? 'UP NEXT → ' + next.session
    : '';

  const colors = getColors(days, hours, mins, live);
  ['d','h','m','s'].forEach((k, i) => setColor('pc-' + k, colors[i]));
}

tick();
setInterval(tick, 1000);
</script>
</body>
