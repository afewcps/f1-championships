name: F1 Session Results 2026

on:
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        pip install fastf1 pandas requests
    - name: Create FastF1 cache directory
      run: mkdir -p fastf1_cache
    - name: Update F1 Results
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      run: |
        echo "🏎️ Updating Results..."
        python f1_session_results_ACTIONS 2026.py
    - name: Log completion
      if: success()
      run: echo "✅ Results updated at $(date)"
    - name: Log failure
      if: failure()
      run: |
        echo "❌ Drivers Championship update failed at $(date)"
