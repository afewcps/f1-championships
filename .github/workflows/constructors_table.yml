name: F1 Constructors Championship Table

on:
  
  workflow_dispatch:

jobs:
  update-constructors:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        pip install requests
    - name: Update Constructors Championship
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      run: |
        echo "🏗️ Updating Constructors Championship for..."
        python f1_constructors_table_ACTIONS_2026.py
    - name: Log completion
      if: success()
      run: echo "✅ Constructors Championship updated at $(date)"
    - name: Log failure
      if: failure()
      run: |
        echo "❌ Drivers Championship update failed at $(date)"
        exit 1
