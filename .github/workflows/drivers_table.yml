name: F1 Drivers Championship Table

on:

  workflow_dispatch:

jobs:
  update-drivers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        pip install requests notion-client
    - name: Update Drivers Championship
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      run: |
        echo "🏎️ Updating Drivers Championship..."
        python f1_drivers_table_ACTIONS_2026.py
    - name: Log completion
      if: success()
      run: echo "✅ Drivers Championship updated at $(date)"
    - name: Log failure
      if: failure()
      run: |
        echo "❌ Drivers Championship update failed at $(date)"
        exit 1
